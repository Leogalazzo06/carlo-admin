<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Carlo Essential</title>
    <link rel="icon" href="logo.webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #eee; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        h1, h2, h3, .font-luxury { font-family: 'Cormorant Garamond', serif; }
        
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .gold-text { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        
        /* Glassmorphism para Modales */
        .modal-glass {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Toggle Gold */
        .toggle-input:checked + .toggle-track { background: #d4af37; }
        .toggle-input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); background: #000; }

        /* Estilo de Carga de Imágenes */
        .upload-zone {
            aspect-ratio: 1/1;
            border: 1px dashed rgba(212, 175, 55, 0.3);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }
        .upload-zone:hover { border-color: #d4af37; background: rgba(212, 175, 55, 0.05); }
        .upload-zone.has-image { border-style: solid; border-color: #d4af37; }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Spinner botón guardar */
        .btn-spinner {
            display: none;
            width: 14px; height: 14px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-loading .btn-text { display: none; }
        .btn-loading .btn-spinner { display: block; }

        /* Modales de confirmación */
        .confirm-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 200;
            display: flex; align-items: center; justify-content: center;
            padding: 1rem;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .confirm-modal.show { opacity: 1; pointer-events: all; }
        .confirm-box {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 1.5rem;
            padding: 2rem 2rem 1.5rem;
            width: 100%; max-width: 380px;
            transform: translateY(12px);
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
            position: relative;
            overflow: hidden;
        }
        .confirm-modal.show .confirm-box { transform: translateY(0); }
        .confirm-box::before {
            content: '';
            position: absolute; top: 0; left: 15%; right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }
        .confirm-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            margin: 0 auto 1.25rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-[280px] bg-[#0a0a0a] border-r border-white/5 flex flex-col z-20">
        <div class="p-10 text-center">
            <h1 class="text-xl font-cinzel gold-text tracking-widest uppercase">Carlo Essential</h1>
            <p class="text-[8px] uppercase tracking-[0.4em] text-gray-500 mt-1">Administración</p>
        </div>

        <nav class="flex-grow px-6 space-y-2">
            <a href="#" class="flex items-center gap-4 p-4 bg-white/5 border border-[#d4af37]/30 rounded-2xl text-[#d4af37] font-bold text-xs uppercase tracking-widest">
                <i class="fa-solid fa-gem"></i> Inventario
            </a>
            <a href="index.html" class="flex items-center gap-4 p-4 text-gray-500 hover:text-white transition-all text-xs uppercase tracking-widest">
                <i class="fa-solid fa-eye"></i> Ver Tienda
            </a>
            <button id="btn-logout" class="w-full flex items-center gap-4 p-4 text-red-900/60 hover:text-red-500 transition-all text-xs uppercase tracking-widest mt-10">
                <i class="fa-solid fa-power-off"></i> Salir
            </button>
        </nav>
    </aside>

    <main class="flex-grow p-6 md:p-12">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-12 gap-6">
            <div>
                <h2 class="text-3xl font-luxury text-white">Gestión de <span class="gold-text">productos</span></h2>
                <p id="stats-text" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-2">Sincronizando...</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                <input type="text" id="admin-buscador" placeholder="Buscar pieza..." 
                    class="bg-white/5 border border-white/10 rounded-full py-3 px-6 text-sm outline-none focus:border-[#d4af37] transition-all w-full lg:w-64">
                
                <button onclick="abrirModalCrear()" class="bg-[#d4af37] text-black px-8 py-3 rounded-full font-black uppercase tracking-widest text-[11px] hover:bg-white transition-all">
                    + Nuevo producto
                </button>
            </div>
        </div>

        <div id="loader" class="flex flex-col items-center justify-center py-32">
            <div class="w-8 h-8 border-2 border-[#d4af37] border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] uppercase tracking-[0.3em] text-gray-600">Cargando productos...</p>
        </div>

        <div id="admin-productos" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 hidden"></div>
    </main>

    <div id="modal-form" class="fixed inset-0 bg-black/90 hidden z-[110] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="modal-glass rounded-[2rem] w-full max-w-2xl p-8 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
            <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-6">
                <h2 id="modal-titulo" class="text-2xl font-luxury gold-text">Nuevo producto</h2>
                <button onclick="cerrarModalAdmin()" class="text-gray-500 hover:text-white text-3xl">&times;</button>
            </div>

            <input type="hidden" id="edit-id">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="text-[9px] font-bold uppercase text-gray-500 tracking-widest mb-2 block">Nombre del Modelo</label>
                    <input type="text" id="nombre" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#d4af37] text-white">
                </div>

                <div>
                    <label class="text-[9px] font-bold uppercase text-gray-500 tracking-widest mb-2 block">Precio ($)</label>
                    <input type="number" id="precio" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#d4af37] text-white">
                </div>

                <div>
                    <label class="text-[9px] font-bold uppercase text-gray-500 tracking-widest mb-2 block">Categoría</label>
                    <select id="categoria" class="w-full bg-[#111] border border-white/10 p-4 rounded-2xl outline-none focus:border-[#d4af37] text-white appearance-none">
                        <option value="Relojes">Relojes</option>
                        <option value="Pulseras">Pulseras</option>
                        <option value="Cadenas">Cadenas</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="text-[9px] font-bold uppercase text-gray-500 tracking-widest mb-4 block">Imágenes</label>
                    <div class="grid grid-cols-3 md:grid-cols-6 gap-3">
                        <div class="upload-zone rounded-xl relative overflow-hidden flex items-center justify-center group" id="zone-1" onclick="triggerFileInput(1)">
                            <input type="file" id="file-input-1" class="hidden" accept="image/*" onchange="handleFileSelect(event, 1)">
                            <i class="fa-solid fa-plus text-gray-700 group-hover:text-[#d4af37]"></i>
                            <img id="preview-1" class="absolute inset-0 w-full h-full object-cover hidden">
                            <input type="hidden" id="img1">
                        </div>
                        <div class="upload-zone rounded-xl relative overflow-hidden flex items-center justify-center group" id="zone-2" onclick="triggerFileInput(2)">
                            <input type="file" id="file-input-2" class="hidden" accept="image/*" onchange="handleFileSelect(event, 2)">
                            <i class="fa-solid fa-plus text-gray-700 group-hover:text-[#d4af37]"></i>
                            <img id="preview-2" class="absolute inset-0 w-full h-full object-cover hidden">
                            <input type="hidden" id="img2">
                        </div>
                        </div>
                </div>

                <div class="md:col-span-2 space-y-4">
                    <label class="text-[9px] font-bold uppercase text-gray-500 tracking-widest block">Detalles</label>
                    <textarea id="descripcion" rows="3" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#d4af37] text-white" placeholder="Descripción del producto..."></textarea>
                    <textarea id="caracteristicas" rows="3" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-[#d4af37] text-white" placeholder="Materiales, tamaño"></textarea>
                </div>

                <div class="md:col-span-2 bg-white/5 p-6 rounded-3xl border border-white/5 flex items-center justify-between">
                    <p class="text-[10px] font-bold uppercase tracking-widest">Disponible en Stock</p>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="disponible" class="sr-only toggle-input" checked>
                        <div class="w-11 h-6 bg-gray-800 rounded-full toggle-track transition-all">
                            <div class="absolute top-[2px] left-[2px] bg-gray-500 w-5 h-5 rounded-full toggle-thumb transition-all"></div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mt-10 flex gap-4">
                <button onclick="cerrarModalAdmin()" class="flex-1 py-4 text-gray-500 font-bold uppercase text-[10px] tracking-widest">Cancelar</button>
                <button onclick="guardarProducto()" id="btn-guardar" class="flex-[2] bg-[#d4af37] text-black py-4 rounded-full font-black uppercase text-[10px] tracking-widest shadow-xl transition-all">
                    <span class="btn-text">Guardar producto</span>
                    <div class="btn-spinner"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configuración simplificada de imágenes (basada en tu lógica anterior)
        function triggerFileInput(n) { document.getElementById(`file-input-${n}`).click(); }
        
        async function handleFileSelect(e, n) {
            const file = e.target.files[0];
            if(!file) return;
            
            // Efecto visual de carga
            const zone = document.getElementById(`zone-${n}`);
            zone.style.opacity = "0.5";

            // Aquí iría tu lógica de Cloudinary que ya tienes configurada
            // Para este ejemplo, simulamos la subida o usamos tu preset:
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", "uploads");

            try {
                const res = await fetch("https://api.cloudinary.com/v1_1/dkqevscys/image/upload", {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();
                
                document.getElementById(`img${n}`).value = data.secure_url;
                const prev = document.getElementById(`preview-${n}`);
                prev.src = data.secure_url;
                prev.classList.remove('hidden');
                zone.classList.add('has-image');
                zone.style.opacity = "1";
            } catch(err) {
                alert("Error subiendo imagen");
                zone.style.opacity = "1";
            }
        }

        function resetImageZones() {
            for(let i=1; i<=6; i++) {
                const img = document.getElementById(`img${i}`);
                if(img) img.value = "";
                const prev = document.getElementById(`preview${i}`);
                if(prev) prev.classList.add('hidden');
            }
        }
    </script>

    <!-- Modal: Cerrar sesión -->
    <div id="modal-logout" class="confirm-modal">
        <div class="confirm-box text-center">
            <div class="confirm-icon bg-red-900/20 text-red-400 mx-auto">
                <i class="fa-solid fa-power-off"></i>
            </div>
            <h3 class="font-luxury text-xl text-white mb-2">Cerrar sesión</h3>
            <p class="text-gray-500 text-xs mb-6 leading-relaxed">¿Seguro que querés salir del panel de administración?</p>
            <div class="flex gap-3">
                <button onclick="cerrarModalConfirm('modal-logout')" class="flex-1 py-3 text-gray-500 font-bold uppercase text-[9px] tracking-widest border border-white/5 rounded-full hover:border-white/20 transition-all">Cancelar</button>
                <button id="btn-confirm-logout" class="flex-1 py-3 bg-red-500/90 text-white font-black uppercase text-[9px] tracking-widest rounded-full hover:bg-red-500 transition-all">
                    <span class="btn-text">Salir</span>
                    <div class="btn-spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff;"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal: Eliminar producto -->
    <div id="modal-eliminar" class="confirm-modal">
        <div class="confirm-box text-center">
            <div class="confirm-icon bg-red-900/20 text-red-400 mx-auto">
                <i class="fa-solid fa-trash-can"></i>
            </div>
            <h3 class="font-luxury text-xl text-white mb-2">Retirar pieza</h3>
            <p class="text-gray-500 text-xs mb-1 leading-relaxed">Estás por eliminar</p>
            <p id="eliminar-nombre" class="text-[#d4af37] font-bold text-sm mb-6 truncate px-4"></p>
            <p class="text-gray-600 text-[10px] mb-6">Esta acción no se puede deshacer.</p>
            <div class="flex gap-3">
                <button onclick="cerrarModalConfirm('modal-eliminar')" class="flex-1 py-3 text-gray-500 font-bold uppercase text-[9px] tracking-widest border border-white/5 rounded-full hover:border-white/20 transition-all">Cancelar</button>
                <button id="btn-confirm-eliminar" class="flex-1 py-3 bg-red-500/90 text-white font-black uppercase text-[9px] tracking-widest rounded-full hover:bg-red-500 transition-all">
                    <span class="btn-text">Eliminar</span>
                    <div class="btn-spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff;"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Utilidades de modales de confirmación ---
        function abrirModalConfirm(id) {
            document.getElementById(id).classList.add('show');
        }
        function cerrarModalConfirm(id) {
            document.getElementById(id).classList.remove('show');
        }
        // Cerrar al click en el fondo
        document.querySelectorAll('.confirm-modal').forEach(m => {
            m.addEventListener('click', e => {
                if(e.target === m) cerrarModalConfirm(m.id);
            });
        });
    </script>

    <script type="module" src="admin.js"></script>
</body>
</html>
